# ld65 config for the FujiNet BASIC.SYSTEM extension.
#
# Produces an AppleSingle-wrapped ProDOS BIN (file type $06) whose payload
# loads at $8000 - the same AppleSingle envelope the stock cc65 apple2 target
# emits, so MekkoGX's `ac -as` disk import works unchanged.  The payload is a
# single relocatable-free image: BRUN it and it installs itself, lowering
# HIMEM to protect the resident and hooking EXTRNCMD.
#
# BSS (buffers) is reserved in the address space but not written to the file.

FEATURES {
    STARTADDRESS: default = $8000;
}
SYMBOLS {
    __EXEHDR__:   type = import;               # AppleSingle header (apple2.lib)
    __FILETYPE__: type = weak, value = $0006;  # ProDOS BIN
    __HIMEM__:    type = weak, value = $9600;  # presumed top of usable RAM
}
# Code/rodata/data are written to the file (HEADER + MAIN); BSS buffers live in
# a separate region that is NOT part of the file, so the AppleSingle payload
# length matches the bytes actually on disk.  Both regions sit below HIMEM and
# are protected together when INSTALL lowers HIMEM to $8000.
MEMORY {
    HEADER: file = %O,               start = %S - $003A, size = $003A;
    MAIN:   file = %O, define = yes, start = %S,     size = $1000;  # $8000-$8FFF
    BSSRAM: file = "", define = yes, start = $9000,  size = $0600;  # $9000-$95FF
}
SEGMENTS {
    EXEHDR: load = HEADER, type = ro,  optional = yes;
    CODE:   load = MAIN,   type = ro;
    RODATA: load = MAIN,   type = ro,  optional = yes;
    DATA:   load = MAIN,   type = rw,  optional = yes;
    BSS:    load = BSSRAM, type = bss, optional = yes, define = yes;
}
